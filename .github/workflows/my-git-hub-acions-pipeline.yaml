name: Nikhil-Shop-Pipeline

env:
  NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

on:
  push:
    branches:
      - main

    workflow_dispatch:
      inputs:
        sonarqube-scan:
          description: "Skip sonar-scan"
          required: true
          default: "false"

        stop_containers:
          description: "Skip Stop Containers"
          required: true
          default: "false"

        remove_old_image:
          description: "Skip Remove old Docker Images"
          required: true
          default: "false"

        docker_compose:
          description: "Skip Build Docker Images"
          required: true
          default: "false"
    

jobs:
  build:
    name: Nikhil-Shop
    runs-on: self-hosted

    steps:
      - name: Git-checkout
        uses: actions/checkout@v6
        
      - name: Setup Node
        uses:  actions/setup-node@v6
        with:
          node-version: '22'
      
      - name: Install Dependencies
        run: npm ci
      
      - name: Build Application
        run: npm run build 

      - name: Sonar Scan
        # if: ${{ github.event.inputs.sonarqube-scan == 'true' }}
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io/
        with:
          args: >
              -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }} 
              -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }} 
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_ID }}
          aws-region: ${{ secrets.AWS_REGION }}
      
      - name: Upload Dist in S3
        run: |
          aws s3 sync ./dist s3://amaz-s3-nikhil-shop/dist-${{ github.run_number }}/ --delete

      - name: Set Image Tag
        run: |
          echo "IMAGE_TAG=v1.0.${{ github.run_number }}" >> $GITHUB_ENV

      - name: Stop Containers
        if: ${{ github.event.inputs.stop_containers == 'true' }}
        run: |
          docker compose down

      - name: Remove Old Application Image
        if: ${{ github.event.inputs.remove_old_image == 'true' }}
        run: |
          docker images "nikhil-shop-*" -q | xargs -r docker rmi -f 

      - name: Docker Image
        if: ${{ github.event.inputs.docker_compose == 'true' }}
        run: docker compose up -d --build

      - name: Trivy Scan
        run: |
          set +e
          curl -sSL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/junit.tpl \
            -o junit.tpl

          SERVICES="cart-service main-service order-service product-service user-service"


          for SERVICE in $SERVICES
          do

            IMAGE=nikhil-shop-$SERVICE:latest

            echo "===================================="
            echo "Scanning \$IMAGE"
            echo "===================================="

            if ! docker image inspect "$IMAGE">/dev/null 2>&1; then
                echo "$IMAGE does not exist. Skipping..."
                continue
            fi
                       
                    
            # Generate readable xml report
            trivy image \
                --scanners vuln \
                --severity HIGH,CRITICAL \
                --format template \
                --template "@junit.tpl" \
                --exit-code 0 \
                -o trivy-report-$SERVICE.xml \
                $IMAGE
            done

            echo "Generated Reports:"
            ls -lh trivy-report-* || true

      - name: Login to Amazon ECR
        run: | 
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

      - name: Tag and Push Images
        run: |
          SERVICES="cart-service main-service order-service product-service user-service"

          for SERVICE in $SERVICES
          do  
            docker tag nikhil-shop-$SERVICE:$IMAGE_TAG \
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/$SERVICE:$IMAGE_TAG

            docker push \
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/$SERVICE:$IMAGE_TAG 
          done
