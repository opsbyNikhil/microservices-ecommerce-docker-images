version: '5'

services:
  cart-service:
    build: ./cart-service
    container_name: cart-service
    ports:
      - "5001:80"
    networks:
      - nikhil-network
    restart: always

  main-service:
    build: ./main-service
    container_name: main-service
    ports:
      - "5002:80"
    networks:
      - nikhil-network
    restart: always

  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "5003:80"
    networks:
      - nikhil-network
    restart: always
  
  
  product-service:
    build: ./product-service
    container_name: product-service
    ports:
      - "5004:80"
    networks:
      - nikhil-network
    restart: always
  
  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "5005:80"
    networks:
      - nikhil-network
    restart: always
  
  nginx:
    image: nginx:1.29
    container_name: nikhil-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - main-service
      - product-service
      - user-service
      - cart-service
      - order-service
    networks:
      - nikhil-network
    restart: always

networks:
  nikhil-network:
    driver: bridge


